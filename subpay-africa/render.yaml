services:
  # Backend API
  - type: web
    name: subpay-africa-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: subpay-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: subpay-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true

databases:
  - name: subpay-db
    databaseName: subpay_africa
    user: subpay

  - name: subpay-redis
    type: redis
